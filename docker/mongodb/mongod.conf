# MongoDB 8 config - Laravel Docker
# Tuned for Credit Control List API and aggregation workloads
# Mount as: - ./docker/mongodb/mongod.conf:/etc/mongod.conf:ro
# Start with: mongod --config /etc/mongod.conf --auth

storage:
  dbPath: /data/db
  # WiredTiger cache: single most important setting for query performance
  # Default is 50% of (RAM - 1GB). In Docker, container may have limited RAM.
  # Set explicitly: 512MB for dev; production: allocate 50-80% of container memory
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5
      # Eviction target: % of cache that triggers eviction (default 80)
      # evictionTarget: 80

net:
  bindIp: 0.0.0.0
  port: 27017

# setParameter overrides (optional - MongoDB 8 defaults are usually sufficient)
# setParameter:
#   internalQueryFacetBufferSizeBytes: 104857600

; PHP-FPM pool www - Laravel Docker
; Listen for Nginx FastCGI on port 9000

[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Logging (access.log off in dev for less I/O; enable if debugging)
access.log = /dev/null
; access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"
slowlog = /var/log/php/php-fpm-slow.log
request_slowlog_timeout = 2

; Timeouts (long-running requests: imports, reports, big DB ops)
request_terminate_timeout = 600

; Clear env for security
clear_env = no

; Catch worker output
catch_workers_output = yes
decorate_workers_output = no

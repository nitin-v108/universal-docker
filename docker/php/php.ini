; Laravel Docker - PHP 8.3 development settings
; Tuned for large applications (long runs, big uploads, heavy MySQL)

[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1
disable_functions =
disable_classes =
zend.enable_gc = On
expose_php = Off
; Long-running scripts, imports, reports (match DB timeouts)
max_execution_time = 600
max_input_time = 600
memory_limit = 4096M
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
track_errors = Off
html_errors = On

; File uploads (large imports, bulk files; post_max_size must be >= upload_max_filesize)
file_uploads = On
upload_max_filesize = 1024M
max_file_uploads = 30
post_max_size = 1024M

; Date
date.timezone = UTC

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
; Revalidate every 1s: faster than 0, code changes still apply quickly (set 0 for instant refresh)
opcache.revalidate_freq = 1
opcache.validate_timestamps = 1

[Session]
session.save_handler = files
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 1440

[curl]
[openssl]
[mbstring]
[intl]
[gd]
[exif]

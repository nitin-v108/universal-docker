# Default server - project index page
# Serves a simple HTML listing of available Laravel projects on port 80

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www;
    index index.html;

    access_log /var/log/nginx/default-access.log;
    error_log  /var/log/nginx/default-error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

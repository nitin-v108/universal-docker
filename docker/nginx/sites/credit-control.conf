# Credit Control API - Node.js on port 8085
# Upstream for PM2 / npm run dev

upstream credit_control_api {
    server credit-control:8085;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev-cc-api.integra-paybill2.co.uk;

    access_log /var/log/nginx/credit-control-access.log;
    error_log  /var/log/nginx/credit-control-error.log;

    location / {
        proxy_pass http://credit_control_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

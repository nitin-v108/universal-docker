# Credit Control Frontend - Vite dev server on port 5173
# React app at dev-cc.integra-paybill2.co.uk
# Use variable + resolver so nginx resolves at request time (avoids "host not found" at startup)
server {
    listen 80;
    listen [::]:80;
    server_name dev-cc.integra-paybill2.co.uk;

    resolver 127.0.0.11 valid=10s;
    set $ccf_upstream credit-control-frontend:5173;

    access_log /var/log/nginx/credit-control-frontend-access.log;
    error_log  /var/log/nginx/credit-control-frontend-error.log;

    # Must proxy /node_modules/.vite/ before dotfile deny – Vite serves deps from there
    location ^~ /node_modules/ {
        proxy_pass http://$ccf_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Vite dev server - HMR via WebSocket
    location / {
        proxy_pass http://$ccf_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Block dotfiles (but not /node_modules/.vite/ – handled above)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Laravel paynbill virtual host

server {
    listen 80;
    listen [::]:80;
    server_name dev-um.integra-paybill2.co.uk;

    root /var/www/user-management/public;
    index index.php;

    access_log /var/log/nginx/user-management-access.log;
    error_log  /var/log/nginx/user-management-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

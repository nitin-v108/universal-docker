# TTM (legacy PHP 5.6) – core PHP app, document root = project root
# Uses php56 service; all other projects use php (8.3)

server {
    listen 80;
    listen [::]:80;
    server_name dev.integra-paybill.co.uk;

    root /var/www/ttm;
    index index.php;

    access_log /var/log/nginx/ttm-access.log;
    error_log  /var/log/nginx/ttm-error.log;

    # Pass path as ?q=... so TTM routing works (same as Apache RewriteRule ^(.*)$ index.php?q=$1)
    location / {
        try_files $uri $uri/ @ttm_router;
    }
    location @ttm_router {
        rewrite ^/(.*)$ /index.php?q=$1&$args last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php56:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

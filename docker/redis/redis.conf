# Redis config - Laravel Docker (shared cache + Credit Control)
# Production-grade: password, AOF, dangerous commands disabled
# In Docker, bind 0.0.0.0 so other containers can connect; security via requirepass

bind 0.0.0.0
port 6379
protected-mode yes

# Password: set via command in docker-compose (requirepass ${REDIS_PASSWORD})
# So REDIS_URL in apps = redis://:YOUR_PASSWORD@redis:6379

# Persistence (AOF recommended)
dir /data
appendonly yes
appendfilename "appendonly.aof"
save 900 1
save 300 10
save 60 10000

# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""

# Memory (optional)
# maxmemory 256mb
# maxmemory-policy allkeys-lru

daemonize no
loglevel notice

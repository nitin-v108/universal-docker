; Supervisor - PHP-FPM + Laravel queue workers
; One worker per project; add new [program:PROJECT-worker] for new projects

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; PHP-FPM (replaces default CMD)
[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/supervisor/php-fpm-stdout.log
stderr_logfile=/var/log/supervisor/php-fpm-stderr.log

; Laravel queue workers - one per project
[program:ipb-2-worker]
command=php /var/www/paynbill/artisan queue:work --sleep=3 --tries=3
directory=/var/www/paynbill
numprocs=1
autostart=true
autorestart=true
startsecs=1
startretries=3
user=www-data
priority=10
stdout_logfile=/var/log/supervisor/paynbill-worker.log
stderr_logfile=/var/log/supervisor/paynbill-worker.err.log

[program:otm-worker]
command=php /var/www/otm-laravel/artisan queue:work --sleep=3 --tries=3
directory=/var/www/otm-laravel
numprocs=1
autostart=true
autorestart=true
startsecs=1
startretries=3
user=www-data
priority=10
stdout_logfile=/var/log/supervisor/otm-laravel-worker.log
stderr_logfile=/var/log/supervisor/otm-laravel-worker.err.log